---
name: Build

on:
  push:
    branches: [master]
    paths:
      - src/**
      - package.json
      - bun.lock
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build dist/index.js
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden the Runner (Step Security)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Audit Dependencies
        run: bun audit

      - name: Run Build
        run: bun run build

      - name: Check for Changes
        id: check
        run: |
          if [ -n "$(git status --porcelain dist/index.js)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.check.outputs.changed == 'true'
        id: create_pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/rebuild-dist
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          sign-commits: true
          title: "chore: rebuild dist/index.js"
          commit-message: "chore: rebuild dist/index.js"
          body: "Automated rebuild of dist/index.js after source changes."
          delete-branch: true

      - name: Enable PR Auto-Merge
        if: steps.create_pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
        run: gh pr merge --auto --squash "${PULL_REQUEST_NUMBER}"
