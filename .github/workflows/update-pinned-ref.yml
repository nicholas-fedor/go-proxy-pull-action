---
name: Update Pinned Ref

on:
  workflow_dispatch:
    inputs:
      repo-owner:
        description: Repository owner
        required: true
        default: nicholas-fedor
      repo-name:
        description: Repository name
        required: true
        default: go-proxy-pull-action
      sha:
        description: Specific commit SHA to use (optional, will fetch latest if not provided)
        required: false
      readme-path:
        description: Path to README.md
        required: false
        default: README.md
  repository_dispatch:
    types: [release]

permissions: read-all

jobs:
  update-ref:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden the Runner (Step Security)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Update Pinned ref in README
        uses: ./.github/actions/update-pinned-ref
        with:
          repo-owner: ${{ github.event.inputs.repo-owner || github.event.client_payload.repo-owner }}
          repo-name: ${{ github.event.inputs.repo-name || github.event.client_payload.repo-name }}
          sha: ${{ github.event.inputs.sha || github.event.client_payload.sha }}
          readme-path: ${{ github.event.inputs.readme-path || github.event.client_payload.readme-path }}
          token: ${{ secrets.GITHUB_TOKEN }}
