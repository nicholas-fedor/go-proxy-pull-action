name: "Go Proxy Cache Updater"
description: "Pull the new release of a module to the Go proxy cache"
author: "Nicholas Fedor"
inputs:
  goproxy:
    description: "URL of the proxy to be passed to `go get` as GOPROXY="
    required: false
    default: "https://proxy.golang.org"
  import_path:
    description: "Package import path. If not set, github.com/<user>/<repo> is used as a default"
    required: false
    default: ""
  go-version:
    description: "The Go version to use (e.g., 1.26, 1.26.1). Semver ranges, stable, oldstable, and wildcards are supported. Takes precedence over go-version-file."
    required: false
    default: "1.26"
  go-version-file:
    description: "Path to a go.mod, go.work, .go-version, or .tool-versions file to read the Go version from. Relative to the repository root."
    required: false
    default: ""
  check-latest:
    description: "Set to true to always check for the latest available version that satisfies the version spec."
    required: false
    default: "false"
  cache:
    description: "Enable caching of Go modules and build outputs. Set to false to disable."
    required: false
    default: "false"
  cache-dependency-path:
    description: "Path to dependency files for caching (e.g., go.sum). Supports glob patterns. Only used when cache is enabled."
    required: false
    default: ""
  architecture:
    description: "Target architecture for Go (e.g., x86, x64). Uses system architecture by default."
    required: false
    default: ""
  token:
    description: "GitHub token for downloading Go distributions. Used for GHES rate limiting scenarios."
    required: false
    default: ""
  go-download-base-url:
    description: "Custom base URL for downloading Go distributions (e.g., for mirrors or air-gapped environments)."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ inputs.go-version }}
        go-version-file: ${{ inputs.go-version-file }}
        check-latest: ${{ inputs.check-latest }}
        cache: ${{ inputs.cache }}
        cache-dependency-path: ${{ inputs.cache-dependency-path }}
        architecture: ${{ inputs.architecture }}
        token: ${{ inputs.token }}
        go-download-base-url: ${{ inputs.go-download-base-url }}
    - name: Pull new module version to proxy
      shell: node24
      run: require('${{ github.action_path }}/dist/index.js')
      env:
        INPUT_GOPROXY: ${{ inputs.goproxy }}
        INPUT_IMPORT_PATH: ${{ inputs.import_path }}
branding:
  icon: "download"
  color: "blue"
